<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cover - 100 Hadist Bukhari Muslim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .cover-card {
            background: #fffdf9;
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid #e1dcd6;
        }
        .title-large {
            font-size: 72px;
            font-weight: bold;
            color: #b39659;
            margin: 0;
            line-height: 1;
        }
        .subtitle {
            font-size: 26px;
            letter-spacing: 3px;
            color: #2c3e50;
            margin: 15px 0 25px 0;
            font-weight: 700;
        }
        .quote {
            font-style: italic;
            color: #7f8c8d;
            border-top: 1px solid #ebdcb9;
            border-bottom: 1px solid #ebdcb9;
            padding: 20px 0;
            margin: 30px 0;
            font-size: 15px;
            line-height: 1.6;
        }
        .author {
            font-size: 18px;
            color: #34495e;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="cover-card">
        <div class="title-large">100</div>
        <div class="subtitle">HADIST BUKHARI MUSLIM</div>
        <div class="quote">"Sumber petunjuk hidup dari sabda Rasulullah ﷺ yang diriwayatkan oleh Imam Bukhari dan Imam Muslim."</div>
        <div class="author">Siti Rohmatuzzakiyyah</div>
    </div>
</body>
</html>
